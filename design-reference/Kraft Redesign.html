<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kraft Mortgages Canada Inc. — Redesign</title>
<meta name="viewport" content="width=1440">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..800;1,9..144,300..800&family=Inter:wght@300..700&family=JetBrains+Mono:wght@300..600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#0A1729; font-family: 'Inter', -apple-system, sans-serif; }
  * { box-sizing: border-box; }
  #root { width: 1440px; margin: 0 auto; }

  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 10000;
    background: #050E1C; color: #E8E1D2; border-radius: 6px;
    padding: 16px 18px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    border: 1px solid rgba(201,169,110,0.3);
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    min-width: 220px; display: none;
  }
  .tweaks-panel.active { display: block; }
  .tweaks-panel h4 { margin: 0 0 12px; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #C9A96E; font-weight: 600;}
  .tweaks-panel .row { display:flex; gap:6px; flex-wrap: wrap; margin-top: 4px;}
  .tweaks-panel button { background:transparent; color:#E8E1D2; border:1px solid rgba(255,255,255,0.15); border-radius:3px; padding:6px 10px; font-size:10px; cursor:pointer; font-family: inherit; letter-spacing: 0.08em;}
  .tweaks-panel button.active { background:#C9A96E; color:#050E1C; border-color:#C9A96E;}
</style>
</head>
<body>

<div id="root"></div>

<div class="tweaks-panel" id="tweaks">
  <h4>Tweaks</h4>
  <div style="opacity:0.6; margin-bottom:6px;">ACCENT TONE</div>
  <div class="row" id="accent-row">
    <button data-accent="gold" class="active">Gold</button>
    <button data-accent="copper">Copper</button>
    <button data-accent="forest">Forest</button>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/direction-terminal.jsx"></script>

<script type="text/babel">
  function MainApp() {
    const [accent, setAccent] = React.useState(document.documentElement.dataset.accent || 'gold');
    React.useEffect(() => {
      const on = (e) => setAccent(e.detail.accent);
      window.addEventListener('tweaks', on);
      return () => window.removeEventListener('tweaks', on);
    }, []);
    return <TerminalHomepage accent={accent}/>;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<MainApp/>);
</script>

<script>
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{ "accent": "gold" }/*EDITMODE-END*/;
  let tweakState = { ...TWEAK_DEFAULTS };

  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('active');
    if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('active');
  });
  window.parent.postMessage({type: '__edit_mode_available'}, '*');

  const applyTweaks = () => {
    document.documentElement.dataset.accent = tweakState.accent;
    window.dispatchEvent(new CustomEvent('tweaks', { detail: tweakState }));
  };
  applyTweaks();

  document.querySelectorAll('#accent-row button').forEach(b => b.onclick = () => {
    document.querySelectorAll('#accent-row button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    tweakState.accent = b.dataset.accent;
    applyTweaks();
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accent: tweakState.accent}}, '*');
  });
</script>

</body>
</html>
